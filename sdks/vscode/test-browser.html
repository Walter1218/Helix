<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helix AI 能力全链路测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      color: #58a6ff;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .test-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .test-header {
      background: #21262d;
      padding: 12px 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .test-title {
      font-weight: 600;
      color: #f0f6fc;
    }
    
    .test-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-pending {
      background: #30363d;
      color: #8b949e;
    }
    
    .status-running {
      background: #1f6feb33;
      color: #58a6ff;
      animation: pulse 1.5s infinite;
    }
    
    .status-passed {
      background: #23863633;
      color: #3fb950;
    }
    
    .status-failed {
      background: #da363333;
      color: #f85149;
    }
    
    .test-content {
      padding: 16px;
    }
    
    .test-case {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    
    .test-case-header {
      padding: 10px 12px;
      background: #161b22;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    
    .test-case-name {
      font-weight: 500;
    }
    
    .test-case-status {
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
    }
    
    .test-case-content {
      padding: 12px;
      display: none;
    }
    
    .test-case-content.active {
      display: block;
    }
    
    .test-case-detail {
      margin-bottom: 8px;
    }
    
    .test-case-detail strong {
      color: #8b949e;
    }
    
    .test-case-detail pre {
      background: #21262d;
      padding: 8px;
      border-radius: 4px;
      margin-top: 4px;
      overflow-x: auto;
      font-size: 12px;
    }
    
    .controls {
      text-align: center;
      margin-bottom: 20px;
    }
    
    button {
      background: #238636;
      color: #ffffff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin: 0 8px;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #2ea043;
    }
    
    button:disabled {
      background: #21262d;
      color: #484f58;
      cursor: not-allowed;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #21262d;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: #58a6ff;
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }
    
    .summary {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    
    .summary-title {
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 12px;
    }
    
    .summary-stats {
      display: flex;
      gap: 20px;
    }
    
    .stat-item {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: #0d1117;
      border-radius: 6px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #58a6ff;
    }
    
    .stat-label {
      font-size: 12px;
      color: #8b949e;
      margin-top: 4px;
    }
    
    .log-container {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    
    .log-entry {
      margin-bottom: 4px;
    }
    
    .log-info {
      color: #58a6ff;
    }
    
    .log-success {
      color: #3fb950;
    }
    
    .log-error {
      color: #f85149;
    }
    
    .log-warning {
      color: #d29922;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
    
    .hidden {
      display: none;
    }
    
    .mode-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 8px;
    }
    
    .mode-ask {
      background: #4a9eff20;
      color: #4a9eff;
    }
    
    .mode-build {
      background: #fb814720;
      color: #fb8147;
    }
    
    .mode-plan {
      background: #c7e2a820;
      color: #c7e2a8;
    }
    
    .mode-compose {
      background: #a7a3d820;
      color: #a7a3d8;
    }
    
    .mode-loop {
      background: #007acc20;
      color: #007acc;
    }
    
    .mode-max {
      background: #e85d7520;
      color: #e85d75;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧬 Helix AI 能力全链路测试</h1>
    
    <div class="controls">
      <button id="startBtn" onclick="startTests()">开始测试</button>
      <button id="stopBtn" onclick="stopTests()" disabled>停止测试</button>
      <button id="clearBtn" onclick="clearResults()">清除结果</button>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="summary">
      <div class="summary-title">测试结果汇总</div>
      <div class="summary-stats">
        <div class="stat-item">
          <div class="stat-value" id="totalTests">0</div>
          <div class="stat-label">总测试数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="passedTests" style="color: #3fb950;">0</div>
          <div class="stat-label">通过</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="failedTests" style="color: #f85149;">0</div>
          <div class="stat-label">失败</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="successRate">0%</div>
          <div class="stat-label">成功率</div>
        </div>
      </div>
    </div>
    
    <div class="log-container" id="logContainer"></div>
    
    <!-- 测试用例将通过 JavaScript 动态生成 -->
    <div id="testSections"></div>
  </div>
  
  <script>
    // 测试配置
    const TEST_CONFIG = {
      baseUrl: 'http://localhost:3095',
      timeout: 30000,
      retries: 3
    };
    
    // 测试状态
    let isRunning = false;
    let currentTestIndex = 0;
    let testResults = {
      passed: 0,
      failed: 0,
      total: 0,
      details: []
    };
    
    // 测试用例定义
    const testSuites = [
      {
        id: 'session',
        name: '会话管理测试',
        tests: [
          { id: 'create-session', name: '创建会话', mode: 'session' },
          { id: 'list-sessions', name: '获取会话列表', mode: 'session' },
          { id: 'get-messages', name: '获取会话消息', mode: 'session' },
          { id: 'delete-session', name: '删除会话', mode: 'session' }
        ]
      },
      {
        id: 'ask',
        name: 'Ask 模式测试',
        tests: [
          { id: 'ask-simple', name: '简单问题', mode: 'ask' },
          { id: 'ask-medium', name: '中等复杂度问题', mode: 'ask' },
          { id: 'ask-complex', name: '复杂代码分析', mode: 'ask' }
        ]
      },
      {
        id: 'build',
        name: 'Build 模式测试',
        tests: [
          { id: 'build-simple', name: '简单函数生成', mode: 'build' },
          { id: 'build-medium', name: '组件生成', mode: 'build' },
          { id: 'build-complex', name: '完整功能模块', mode: 'build' }
        ]
      },
      {
        id: 'plan',
        name: 'Plan 模式测试',
        tests: [
          { id: 'plan-simple', name: '简单计划', mode: 'plan' },
          { id: 'plan-medium', name: '架构设计', mode: 'plan' },
          { id: 'plan-complex', name: '系统迁移方案', mode: 'plan' }
        ]
      },
      {
        id: 'compose',
        name: 'Compose 模式测试',
        tests: [
          { id: 'compose-simple', name: '函数重构', mode: 'compose' },
          { id: 'compose-medium', name: '跨文件重构', mode: 'compose' },
          { id: 'compose-complex', name: '系统级重构', mode: 'compose' }
        ]
      },
      {
        id: 'loop',
        name: 'Loop 模式测试',
        tests: [
          { id: 'loop-simple', name: '单次迭代', mode: 'loop' },
          { id: 'loop-medium', name: '多轮迭代', mode: 'loop' },
          { id: 'loop-complex', name: '自适应优化', mode: 'loop' }
        ]
      },
      {
        id: 'max',
        name: 'Max 模式测试',
        tests: [
          { id: 'max-simple', name: '并行处理', mode: 'max' },
          { id: 'max-medium', name: '多智能体协作', mode: 'max' },
          { id: 'max-complex', name: '全能力执行', mode: 'max' }
        ]
      },
      {
        id: 'tool',
        name: '工具调用测试',
        tests: [
          { id: 'tool-file', name: '文件读取工具', mode: 'tool' },
          { id: 'tool-code', name: '代码执行工具', mode: 'tool' }
        ]
      },
      {
        id: 'permission',
        name: '权限管理测试',
        tests: [
          { id: 'permission-handle', name: '权限请求处理', mode: 'permission' }
        ]
      }
    ];
    
    // 初始化测试界面
    function initTestUI() {
      const container = document.getElementById('testSections');
      container.innerHTML = '';
      
      testSuites.forEach(suite => {
        const section = document.createElement('div');
        section.className = 'test-section';
        section.id = `section-${suite.id}`;
        
        section.innerHTML = `
          <div class="test-header">
            <span class="test-title">${suite.name}</span>
            <span class="test-status status-pending" id="status-${suite.id}">待测试</span>
          </div>
          <div class="test-content">
            ${suite.tests.map(test => `
              <div class="test-case" id="case-${test.id}">
                <div class="test-case-header" onclick="toggleTestCase('${test.id}')">
                  <span class="test-case-name">
                    ${test.name}
                    <span class="mode-badge mode-${test.mode}">${test.mode.toUpperCase()}</span>
                  </span>
                  <span class="test-case-status status-pending" id="test-status-${test.id}">待测试</span>
                </div>
                <div class="test-case-content" id="test-content-${test.id}">
                  <div class="test-case-detail">
                    <strong>测试ID:</strong> ${test.id}
                  </div>
                  <div class="test-case-detail">
                    <strong>测试模式:</strong> ${test.mode}
                  </div>
                  <div class="test-case-detail">
                    <strong>测试结果:</strong>
                    <pre id="test-result-${test.id}">等待测试执行...</pre>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        
        container.appendChild(section);
      });
    }
    
    // 切换测试用例详情显示
    function toggleTestCase(testId) {
      const content = document.getElementById(`test-content-${testId}`);
      content.classList.toggle('active');
    }
    
    // 添加日志
    function addLog(message, type = 'info') {
      const logContainer = document.getElementById('logContainer');
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }
    
    // 更新进度条
    function updateProgress(current, total) {
      const percentage = (current / total) * 100;
      document.getElementById('progressFill').style.width = `${percentage}%`;
    }
    
    // 更新测试统计
    function updateStats() {
      document.getElementById('totalTests').textContent = testResults.total;
      document.getElementById('passedTests').textContent = testResults.passed;
      document.getElementById('failedTests').textContent = testResults.failed;
      
      const successRate = testResults.total > 0 
        ? ((testResults.passed / testResults.total) * 100).toFixed(2)
        : 0;
      document.getElementById('successRate').textContent = `${successRate}%`;
    }
    
    // 更新测试状态
    function updateTestStatus(testId, status, result = null) {
      const statusElement = document.getElementById(`test-status-${testId}`);
      const resultElement = document.getElementById(`test-result-${testId}`);
      
      statusElement.className = `test-case-status status-${status}`;
      statusElement.textContent = status === 'passed' ? '✅ 通过' : 
                                 status === 'failed' ? '❌ 失败' : 
                                 status === 'running' ? '🔄 运行中' : '待测试';
      
      if (result) {
        resultElement.textContent = typeof result === 'object' 
          ? JSON.stringify(result, null, 2)
          : result;
      }
    }
    
    // 更新测试套件状态
    function updateSuiteStatus(suiteId, status) {
      const statusElement = document.getElementById(`status-${suiteId}`);
      statusElement.className = `test-status status-${status}`;
      statusElement.textContent = status === 'passed' ? '✅ 通过' : 
                                 status === 'failed' ? '❌ 失败' : 
                                 status === 'running' ? '🔄 运行中' : '待测试';
    }
    
    // 模拟 API 调用
    async function fetchApi(endpoint, options = {}) {
      const url = `${TEST_CONFIG.baseUrl}${endpoint}`;
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), TEST_CONFIG.timeout);
      
      try {
        // 模拟网络延迟
        await new Promise(resolve => setTimeout(resolve, 100 + Math.random() * 200));
        
        // 模拟 API 响应
        const response = {
          ok: true,
          json: async () => {
            // 根据端点返回模拟数据
            if (endpoint.includes('/session') && options.method === 'POST') {
              return { id: 'session-' + Date.now(), title: 'Test Session' };
            }
            if (endpoint.includes('/session') && !options.method) {
              return [{ id: 'session-1', title: 'Session 1' }];
            }
            if (endpoint.includes('/message')) {
              return {
                parts: [
                  { type: 'text', text: '这是模拟的 AI 响应内容。' }
                ]
              };
            }
            return {};
          }
        };
        
        clearTimeout(timeoutId);
        return response;
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }
    
    // 执行单个测试
    async function runTest(test) {
      updateTestStatus(test.id, 'running');
      addLog(`开始测试: ${test.name} (${test.mode})`, 'info');
      
      try {
        let result;
        
        // 根据测试类型执行不同的测试逻辑
        if (test.mode === 'session') {
          result = await runSessionTest(test);
        } else if (['ask', 'build', 'plan', 'compose', 'loop', 'max'].includes(test.mode)) {
          result = await runModeTest(test);
        } else if (test.mode === 'tool') {
          result = await runToolTest(test);
        } else if (test.mode === 'permission') {
          result = await runPermissionTest(test);
        }
        
        updateTestStatus(test.id, 'passed', result);
        testResults.passed++;
        addLog(`✅ 测试通过: ${test.name}`, 'success');
        
        return { success: true, result };
      } catch (error) {
        updateTestStatus(test.id, 'failed', error.message);
        testResults.failed++;
        addLog(`❌ 测试失败: ${test.name} - ${error.message}`, 'error');
        
        return { success: false, error: error.message };
      } finally {
        testResults.total++;
        updateStats();
      }
    }
    
    // 会话管理测试
    async function runSessionTest(test) {
      const sessionId = 'test-session-' + Date.now();
      
      switch (test.id) {
        case 'create-session':
          const createResponse = await fetchApi('/session', {
            method: 'POST',
            body: JSON.stringify({ title: 'Test Session' })
          });
          return { sessionId: createResponse.id, created: true };
          
        case 'list-sessions':
          const listResponse = await fetchApi('/session?limit=10');
          return { sessions: listResponse, count: listResponse.length };
          
        case 'get-messages':
          const messagesResponse = await fetchApi(`/session/${sessionId}/message`);
          return { messages: messagesResponse, count: messagesResponse.length };
          
        case 'delete-session':
          await fetchApi(`/session/${sessionId}`, { method: 'DELETE' });
          return { deleted: true };
          
        default:
          throw new Error(`未知的会话测试: ${test.id}`);
      }
    }
    
    // 模式测试
    async function runModeTest(test) {
      const sessionId = 'test-session-' + Date.now();
      const prompts = {
        'ask-simple': '什么是 TypeScript？',
        'ask-medium': '解释 React Hooks 的工作原理',
        'ask-complex': '分析这段代码的性能瓶颈并提供优化方案',
        'build-simple': '创建一个计算斐波那契数列的函数',
        'build-medium': '实现一个带分页的用户列表组件',
        'build-complex': '构建一个完整的待办事项应用',
        'plan-simple': '制定代码重构计划',
        'plan-medium': '设计微服务架构方案',
        'plan-complex': '规划大型系统迁移方案',
        'compose-simple': '重构这个函数，提高可读性',
        'compose-medium': '重构项目结构，模块化功能',
        'compose-complex': '重构整个应用架构',
        'loop-simple': '优化这段代码的性能',
        'loop-medium': '通过多轮迭代改进代码质量',
        'loop-complex': '根据测试结果自适应优化算法',
        'max-simple': '并行处理多个简单任务',
        'max-medium': '协调多个智能体完成复杂任务',
        'max-complex': '使用所有可用能力解决复杂问题'
      };
      
      const prompt = prompts[test.id] || '测试消息';
      
      const response = await fetchApi(`/session/${sessionId}/message`, {
        method: 'POST',
        body: JSON.stringify({
          parts: [{ type: 'text', text: prompt }],
          agent: test.mode
        })
      });
      
      return {
        prompt,
        response: response.parts,
        hasResponse: response.parts && response.parts.length > 0
      };
    }
    
    // 工具调用测试
    async function runToolTest(test) {
      const sessionId = 'test-session-' + Date.now();
      
      const prompts = {
        'tool-file': '读取 package.json 文件内容',
        'tool-code': '执行一个简单的 JavaScript 代码片段'
      };
      
      const prompt = prompts[test.id] || '测试工具调用';
      
      const response = await fetchApi(`/session/${sessionId}/message`, {
        method: 'POST',
        body: JSON.stringify({
          parts: [{ type: 'text', text: prompt }],
          agent: 'ask'
        })
      });
      
      return {
        prompt,
        hasToolCall: response.parts && response.parts.some(part => part.type === 'tool'),
        parts: response.parts
      };
    }
    
    // 权限管理测试
    async function runPermissionTest(test) {
      const permissionId = 'test-permission-' + Date.now();
      
      // 模拟批准权限
      await fetchApi(`/permission/${permissionId}/reply`, {
        method: 'POST',
        body: JSON.stringify({ approved: true, always: false })
      });
      
      // 模拟拒绝权限
      await fetchApi(`/permission/${permissionId}/reply`, {
        method: 'POST',
        body: JSON.stringify({ approved: false, always: false })
      });
      
      return {
        permissionId,
        approved: true,
        denied: true
      };
    }
    
    // 开始测试
    async function startTests() {
      if (isRunning) return;
      
      isRunning = true;
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      
      addLog('🚀 开始 Helix AI 能力全链路测试...', 'info');
      
      // 重置测试结果
      testResults = {
        passed: 0,
        failed: 0,
        total: 0,
        details: []
      };
      updateStats();
      
      // 计算总测试数
      const totalTests = testSuites.reduce((sum, suite) => sum + suite.tests.length, 0);
      let completedTests = 0;
      
      // 执行所有测试套件
      for (const suite of testSuites) {
        addLog(`\n📋 开始测试套件: ${suite.name}`, 'info');
        updateSuiteStatus(suite.id, 'running');
        
        let suitePassed = 0;
        let suiteFailed = 0;
        
        // 执行套件中的每个测试
        for (const test of suite.tests) {
          if (!isRunning) break;
          
          const result = await runTest(test);
          if (result.success) {
            suitePassed++;
          } else {
            suiteFailed++;
          }
          
          completedTests++;
          updateProgress(completedTests, totalTests);
        }
        
        // 更新套件状态
        if (suiteFailed === 0) {
          updateSuiteStatus(suite.id, 'passed');
          addLog(`✅ 测试套件通过: ${suite.name}`, 'success');
        } else {
          updateSuiteStatus(suite.id, 'failed');
          addLog(`❌ 测试套件失败: ${suite.name} (${suiteFailed} 个失败)`, 'error');
        }
      }
      
      // 测试完成
      isRunning = false;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      
      addLog(`\n🎉 测试完成！通过: ${testResults.passed}, 失败: ${testResults.failed}`, 'info');
      
      // 生成测试报告
      generateTestReport();
    }
    
    // 停止测试
    function stopTests() {
      isRunning = false;
      addLog('⏹️ 测试已停止', 'warning');
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
    }
    
    // 清除结果
    function clearResults() {
      document.getElementById('logContainer').innerHTML = '';
      document.getElementById('progressFill').style.width = '0%';
      
      // 重置所有测试状态
      testSuites.forEach(suite => {
        updateSuiteStatus(suite.id, 'pending');
        suite.tests.forEach(test => {
          updateTestStatus(test.id, 'pending');
        });
      });
      
      testResults = {
        passed: 0,
        failed: 0,
        total: 0,
        details: []
      };
      updateStats();
      
      addLog('🧹 测试结果已清除', 'info');
    }
    
    // 生成测试报告
    function generateTestReport() {
      const report = {
        timestamp: new Date().toISOString(),
        summary: {
          total: testResults.total,
          passed: testResults.passed,
          failed: testResults.failed,
          successRate: testResults.total > 0 
            ? ((testResults.passed / testResults.total) * 100).toFixed(2) + '%'
            : '0%'
        },
        suites: testSuites.map(suite => ({
          name: suite.name,
          tests: suite.tests.map(test => ({
            id: test.id,
            name: test.name,
            mode: test.mode,
            status: document.getElementById(`test-status-${test.id}`).textContent
          }))
        }))
      };
      
      addLog('\n📄 测试报告:', 'info');
      addLog(JSON.stringify(report, null, 2), 'info');
      
      // 在实际环境中，可以将报告保存到文件或发送到监控系统
      console.log('测试报告:', report);
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      initTestUI();
      addLog('🧬 Helix AI 能力全链路测试工具已加载', 'info');
      addLog('点击"开始测试"按钮开始执行测试', 'info');
    });
  </script>
</body>
</html>
